- name: Variable through prompt
  hosts: local
  connection: local
  vars_prompt:
    - name: username
      prompt: What is your username?
      private: false

    - name: password
      prompt: What is your password?
      private: true
      
  tasks:

    - name: Print a message
      ansible.builtin.debug:
        msg: "Hello, Username is: {{ username }}"
  