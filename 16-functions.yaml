- name: Functions
  hosts: local
  connection: local
  vars:
    technologies: DevOps, Linux, AWS, Shell, Ansible
    name: "priya"
    gmail: priya@gmail.com 
    ipaddress: 192.168.0.1
    
    tags: 
      Application: payment
      Environment: dev

    listtags:
    - key: Application
      value: payment
    - key: Environment
      value: dev

  tasks:
  - name: default variables
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('ABC') }}" 

  - name: convert string to list
    ansible.builtin.debug:
      msg: "technologies are: {{ technologies | split(',') }}"

  - name: convert map to list
    ansible.builtin.debug:
      msg: "Tags are: {{ tags | dict2items }}"

  - name: convert list to map
    ansible.builtin.debug:
      msg: "Tag map: {{ listtags | items2dict }}"

  - name: read yaml and take it into variable
    ansible.builtin.set_fact:
        file_yaml: "{{ lookup('file', '03-file.yaml') | from_yaml }}"

  - name: convert yaml into jason
    ansible.builtin.debug:
        msg: "json: {{ file_yaml | to_json }}"

  - name: save json to file
    ansible.builtin.copy:
      dest: ./student-data.json
      content: "{{ file_yaml | to_nice_json }}"

  - name: convert to uppercase
    ansible.builtin.debug:
      msg: "{{ name | upper }}"

  - name: convert to lower
    ansible.builtin.debug:
      msg: "{{ gmail | lower }}"

  - name: check IP is valid or not
    ansible.builtin.debug:
      msg: "{{ ipaddress | ansible.utils.ipv4 }}"

  - name: grep for root
    ansible.builtin.command: cat /etc/passwd | grep root
    register: command_output

  - name: print the command_output
    ansible.builtin.debug:
      msg: "{{ command_output }}"